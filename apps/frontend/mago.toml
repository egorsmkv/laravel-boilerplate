# Mago Configuration File
# https://mago.carthage.software/

[source]
includes = [
  "app/**/*.php",
  "config/**/*.php",
  "database/**/*.php",
  "routes/**/*.php",
  "resources/**/*.php",
]
excludes = [
  "vendor/**",
  "storage/**",
  "bootstrap/cache/**",
  "**/*.blade.php",
]

[formatter]
excludes = [
  "**/*.blade.php",
]

[linter]
excludes = [
  "**/*.blade.php",
]
